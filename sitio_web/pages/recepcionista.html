<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <title>Panel Reservas | Holiday Estate</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed": "#ffdea5", "outline": "#7f7667", "on-surface-variant": "#4e4639",
            "surface-variant": "#e3e2e0", "on-background": "#1a1c1a", "surface-container-low": "#f4f3f1",
            "surface-container-lowest": "#ffffff", "background": "#faf9f6", "on-secondary": "#ffffff",
            "on-primary-container": "#4e3700", "surface-container": "#efeeeb", "outline-variant": "#d1c5b4",
            "surface-tint": "#775a19", "secondary": "#5f5e5e", "on-surface": "#1a1c1a",
            "primary": "#775a19", "surface-dim": "#dbdad7", "error": "#ba1a1a",
            "surface-container-high": "#e9e8e5"
          },
          fontFamily: { "headline": ["Noto Serif"], "body": ["Manrope"], "label": ["Manrope"] },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Manrope', sans-serif; background-color: #faf9f6; color: #1a1c1a; }
    .serif-text { font-family: 'Noto Serif', serif; }
    /* Estilos para modales */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; visibility: hidden; opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-container {
      background: white; max-width: 500px; width: 90%; border-radius: 0.5rem;
      padding: 2rem; box-shadow: 0 32px 64px rgba(0,0,0,0.1);
    }
    .habitacion-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .habitacion-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-surface min-h-screen">
  <!-- Header superior (se mantiene igual que tu diseño, sin barra lateral) -->
  <header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-md flex items-center justify-between px-10 py-4 shadow-[0_32px_32px_rgba(26,28,26,0.05)]">
    <div class="flex items-center gap-6 w-1/2">
      <div class="relative w-full max-w-md">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary text-sm">search</span>
        <input id="searchInput" class="w-full bg-surface-container-high border-none rounded-sm py-2 pl-10 pr-4 text-xs" placeholder="Buscar habitaciones..." type="text" />
      </div>
    </div>
    <div class="flex items-center gap-8">
      <button onclick="location.reload()" class="font-semibold text-xs uppercase tracking-widest text-primary border-b border-primary/20 pb-0.5">Actualizar</button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="max-w-7xl mx-auto px-10 py-12">
    <div class="text-center mb-12">
      <p class="font-label text-xs uppercase tracking-[0.2em] text-primary mb-2">Holiday Estate</p>
      <h2 class="serif-text text-5xl font-light text-on-surface">Selecciona tu habitación</h2>
      <p class="text-secondary mt-2 max-w-md mx-auto">Todas nuestras suites con los mejores precios garantizados</p>
    </div>

    <!-- Grid de habitaciones (se llena dinámicamente) -->
    <div id="habitacionesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="col-span-full text-center py-20 text-secondary">Cargando habitaciones...</div>
    </div>
  </main>

  <!-- Modal para datos personales -->
  <div id="modalPersonal" class="modal-overlay">
    <div class="modal-container">
      <h3 class="serif-text text-2xl mb-6">Datos del huésped</h3>
      <form id="formPersonal" class="space-y-4">
        <input type="text" id="nombre" placeholder="Nombre completo" required class="w-full p-3 border border-outline-variant rounded-sm focus:ring-1 focus:ring-primary">
        <input type="text" id="apellido" placeholder="Apellidos" required class="w-full p-3 border border-outline-variant rounded-sm">
        <input type="number" id="edad" placeholder="Edad" required class="w-full p-3 border border-outline-variant rounded-sm">
        <input type="email" id="email" placeholder="Correo electrónico" required class="w-full p-3 border border-outline-variant rounded-sm">
        <input type="tel" id="telefono" placeholder="Teléfono" required class="w-full p-3 border border-outline-variant rounded-sm">
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" id="cancelPersonal" class="px-4 py-2 border border-outline-variant rounded-sm text-secondary">Cancelar</button>
          <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-sm">Continuar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal para fechas -->
  <div id="modalFechas" class="modal-overlay">
    <div class="modal-container">
      <h3 class="serif-text text-2xl mb-6">Fechas de la reserva</h3>
      <form id="formFechas" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs uppercase text-secondary mb-1">Check-in</label><input type="date" id="checkin" required class="w-full p-3 border rounded-sm"></div>
          <div><label class="block text-xs uppercase text-secondary mb-1">Check-out</label><input type="date" id="checkout" required class="w-full p-3 border rounded-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs uppercase text-secondary mb-1">Adultos</label><input type="number" id="adultos" value="2" min="1" class="w-full p-3 border rounded-sm"></div>
          <div><label class="block text-xs uppercase text-secondary mb-1">Niños</label><input type="number" id="ninos" value="0" min="0" class="w-full p-3 border rounded-sm"></div>
        </div>
        <div class="bg-surface-container-low p-4 rounded-sm mt-4">
          <div class="flex justify-between text-sm"><span>Precio por noche</span><span id="precioMostrado" class="font-bold">$0</span></div>
          <div class="flex justify-between text-sm mt-2"><span>Total (estimado)</span><span id="totalMostrado" class="font-bold text-primary">$0</span></div>
        </div>
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" id="cancelFechas" class="px-4 py-2 border rounded-sm">Cancelar</button>
          <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-sm">Confirmar reserva</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';
    let habitacionSeleccionada = null;
    let datosCliente = {};

    // Cargar habitaciones desde el backend
    async function cargarHabitaciones() {
      try {
        const response = await fetch(`${API}/habitaciones`);
        if (!response.ok) throw new Error(`Error ${response.status}`);
        const habitaciones = await response.json();
        const grid = document.getElementById('habitacionesGrid');
        if (!habitaciones.length) {
          grid.innerHTML = '<div class="col-span-full text-center py-20 text-secondary">No hay habitaciones disponibles</div>';
          return;
        }
        grid.innerHTML = habitaciones.map(h => `
          <div class="habitacion-card bg-surface-container-lowest rounded-sm overflow-hidden shadow-sm" data-id="${h.id}" data-precio="${h.precio_base}">
           <img src="${h.imagen_url || 'https://via.placeholder.com/400x250?text=Sin+imagen'}" alt="${h.nombre}" class="w-full h-56 object-cover">
            <div class="p-5">
              <h3 class="serif-text text-xl font-bold text-on-surface">${h.nombre}</h3>
              <p class="text-secondary text-sm mt-1">${h.tipo} · ${h.capacidad} huéspedes</p>
              <div class="mt-3 flex justify-between items-center">
                <span class="text-2xl font-bold text-primary">$${h.precio_base}</span>
                <span class="text-secondary text-xs uppercase">por noche</span>
              </div>
              <p class="text-xs text-secondary mt-2 line-clamp-2">${h.descripcion || 'Disfrute de una experiencia única.'}</p>
            </div>
          </div>
        `).join('');
        // Añadir evento click a cada tarjeta
        document.querySelectorAll('.habitacion-card').forEach(card => {
          card.addEventListener('click', () => {
            const id = parseInt(card.dataset.id);
            const precio = parseFloat(card.dataset.precio);
            habitacionSeleccionada = habitaciones.find(h => h.id === id);
            if (habitacionSeleccionada) {
              document.getElementById('precioMostrado').innerText = `$${habitacionSeleccionada.precio_base}`;
              abrirModalPersonal();
            }
          });
        });
      } catch (error) {
        console.error('Error al cargar habitaciones:', error);
        document.getElementById('habitacionesGrid').innerHTML = `<div class="col-span-full text-center text-error">Error al cargar habitaciones. Asegúrate que el servidor esté corriendo.</div>`;
      }
    }

    function abrirModalPersonal() { document.getElementById('modalPersonal').classList.add('active'); }
    function cerrarModalPersonal() { document.getElementById('modalPersonal').classList.remove('active'); document.getElementById('formPersonal').reset(); }
    function abrirModalFechas() { document.getElementById('modalFechas').classList.add('active'); }
    function cerrarModalFechas() { document.getElementById('modalFechas').classList.remove('active'); document.getElementById('formFechas').reset(); }

    // Enviar reserva
    async function enviarReserva(fechas) {
      const noches = Math.ceil((new Date(fechas.checkout) - new Date(fechas.checkin)) / (1000*60*60*24));
      const precioTotal = habitacionSeleccionada.precio_base * noches;
      const payload = {
        cliente_nombre: `${datosCliente.nombre} ${datosCliente.apellido}`,
        cliente_email: datosCliente.email,
        cliente_telefono: datosCliente.telefono,
        habitacion_id: habitacionSeleccionada.id,
        fecha_checkin: fechas.checkin,
        fecha_checkout: fechas.checkout,
        adultos: fechas.adultos,
        ninos: fechas.ninos,
        precio_noche: habitacionSeleccionada.precio_base,
        precio_total: precioTotal,
        empresa_id: null
      };
      try {
        const response = await fetch(`${API}/reservas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (response.ok) {
          alert('✅ Reserva confirmada exitosamente');
          cerrarModalFechas();
          cargarHabitaciones(); // recargar para actualizar disponibilidad
        } else {
          const err = await response.json();
          alert(`❌ Error: ${err.error || 'No se pudo completar la reserva'}`);
        }
      } catch (error) {
        alert('Error de conexión con el servidor');
      }
    }

    // Manejar formulario personal
    document.getElementById('formPersonal').addEventListener('submit', (e) => {
      e.preventDefault();
      datosCliente = {
        nombre: document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        edad: document.getElementById('edad').value,
        email: document.getElementById('email').value.trim(),
        telefono: document.getElementById('telefono').value.trim()
      };
      if (!datosCliente.nombre || !datosCliente.apellido || !datosCliente.email) {
        alert('Por favor complete todos los campos obligatorios');
        return;
      }
      cerrarModalPersonal();
      abrirModalFechas();
    });

    // Manejar formulario fechas
    document.getElementById('formFechas').addEventListener('submit', (e) => {
      e.preventDefault();
      const checkin = document.getElementById('checkin').value;
      const checkout = document.getElementById('checkout').value;
      const adultos = parseInt(document.getElementById('adultos').value);
      const ninos = parseInt(document.getElementById('ninos').value);
      if (!checkin || !checkout) { alert('Seleccione fechas'); return; }
      if (new Date(checkin) >= new Date(checkout)) { alert('El check-out debe ser posterior al check-in'); return; }
      enviarReserva({ checkin, checkout, adultos, ninos });
    });

    // Actualizar total estimado al cambiar fechas
    function actualizarTotal() {
      const checkin = document.getElementById('checkin').value;
      const checkout = document.getElementById('checkout').value;
      if (checkin && checkout && habitacionSeleccionada) {
        const noches = Math.ceil((new Date(checkout) - new Date(checkin)) / (1000*60*60*24));
        const total = habitacionSeleccionada.precio_base * noches;
        document.getElementById('totalMostrado').innerText = `$${total}`;
      }
    }
    document.getElementById('checkin').addEventListener('change', actualizarTotal);
    document.getElementById('checkout').addEventListener('change', actualizarTotal);

    // Botones cancelar
    document.getElementById('cancelPersonal').addEventListener('click', cerrarModalPersonal);
    document.getElementById('cancelFechas').addEventListener('click', cerrarModalFechas);

    // Búsqueda en tiempo real
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.habitacion-card');
      cards.forEach(card => {
        const title = card.querySelector('h3').innerText.toLowerCase();
        card.style.display = title.includes(term) ? 'block' : 'none';
      });
    });

    // Inicializar
    cargarHabitaciones();
  </script>
</body>
</html>
